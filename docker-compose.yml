services:
  broker:
    image: docker.io/library/redis:7-alpine
    container_name: dg-repo-redis
    restart: unless-stopped
    volumes:
      - ./dg-redis-data:/data

  db:
    image: docker.io/library/postgres:16-alpine
    container_name: dg-repo-db
    restart: unless-stopped
    volumes:
      - ./dg-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: dg_secure_db_pass_123

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: dg-repo-web
    restart: unless-stopped
    depends_on:
      - db
      - broker
    ports:
      - "8010:8000"
    volumes:
      - ./dg-data:/usr/src/paperless/data
      - ./dg-media:/usr/src/paperless/media
      - ./dg-export:/usr/src/paperless/export
      - ./dg-consume:/usr/src/paperless/consume
    env_file: docker-compose.env
